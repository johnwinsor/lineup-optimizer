name: Daily Data Refresh
on:
  schedule:
    - cron: '0 4 * * *' # 4:00 AM UTC
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Install dependencies
        run: uv sync
        
      - name: Fetch Statcast and Projections
        run: uv run python fetch_statcast.py
        
      - name: Prepare deployment
        run: |
          mkdir -p public
          # Copy everything needed for the dashboard and the optimizer
          cp index.html public/
          cp *.json public/ 2>/dev/null || true
          touch public/.nojekyll
          
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true # IMPORTANT: We want to keep existing files
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
