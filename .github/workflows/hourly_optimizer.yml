name: Hourly Lineup Update
on:
  schedule:
    - cron: '0 12-23 * * *' # Every hour from 12 PM to 11 PM UTC
    - cron: '0 0-1 * * *'   # 12 AM and 1 AM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Install dependencies
        run: uv sync
        
      - name: Download existing data from gh-pages
        run: |
          # We checkout the gh-pages branch into a temporary folder to get the latest projections
          git fetch origin gh-pages
          git checkout origin/gh-pages -- "*.json" || true
          echo "Current directory files:"
          ls -F
        
      - name: Run Full Optimizer (Hitters & Pitchers)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python update_web_data.py
        
      - name: Prepare public files
        run: |
          mkdir -p public
          cp index.html public/
          cp *.json public/
          touch public/.nojekyll
          echo "Files to be deployed:"
          ls -R public/
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
