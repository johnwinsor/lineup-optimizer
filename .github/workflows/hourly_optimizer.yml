name: Hourly Lineup Update
on:
  schedule:
    - cron: '0 12-23 * * *' # Every hour from 12 PM to 11 PM UTC
    - cron: '0 0-1 * * *'   # 12 AM and 1 AM UTC
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
        
      - name: Install dependencies
        run: uv sync
        
      - name: Run Optimizer (Today - ATC)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python main.py --projection atc --output lineup_atc_today.json
        
      - name: Run Optimizer (Today - Steamer)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python main.py --projection steamer --output lineup_steamer_today.json
        
      - name: Run Optimizer (Tomorrow - ATC)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TOMORROW=$(date -d "+1 day" +%Y-%m-%d)
          uv run python main.py --projection atc --date $TOMORROW --output lineup_atc_tomorrow.json

      - name: Run Optimizer (Tomorrow - Steamer)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TOMORROW=$(date -d "+1 day" +%Y-%m-%d)
          uv run python main.py --projection steamer --date $TOMORROW --output lineup_steamer_tomorrow.json
        
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          keep_files: false
          destination_dir: .
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          # We only want to publish the web dashboard files
          glob_pattern: |
            index.html
            lineup_*.json
