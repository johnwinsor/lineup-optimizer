<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zurich Zebras Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans" x-data="dashboard()">
    <div class="max-w-6xl mx-auto">
        
        <!-- Header -->
        <header class="mb-8 border-b border-slate-700 pb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Zurich Zebras Optimizer</h1>
                <p class="text-slate-400 mt-1">Ottoneu Team 7582 • Daily 5x5 Roto Efficiency</p>
            </div>
            <div class="flex flex-col items-end gap-2 w-full md:w-auto">
                <div class="flex gap-2">
                    <!-- Projection Toggle -->
                    <div class="inline-flex p-1 bg-slate-800 rounded-lg border border-slate-700">
                        <button @click="switchProj('atc')" 
                                :class="activeProj === 'atc' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'"
                                class="px-3 py-1 rounded-md text-xs font-bold uppercase transition-all">
                            ATC
                        </button>
                        <button @click="switchProj('steamer')" 
                                :class="activeProj === 'steamer' ? 'bg-indigo-600 text-white' : 'text-slate-400 hover:text-white'"
                                class="px-3 py-1 rounded-md text-xs font-bold uppercase transition-all">
                            Steamer
                        </button>
                    </div>

                    <!-- Date Toggle -->
                    <div class="inline-flex p-1 bg-slate-800 rounded-lg border border-slate-700">
                        <button @click="switchDate('today')" 
                                :class="activeDate === 'today' ? 'bg-slate-600 text-white' : 'text-slate-400 hover:text-white'"
                                class="px-4 py-1 rounded-md text-xs font-semibold transition-all">
                            Today
                        </button>
                        <button @click="switchDate('tomorrow')" 
                                :class="activeDate === 'tomorrow' ? 'bg-slate-600 text-white' : 'text-slate-400 hover:text-white'"
                                class="px-4 py-1 rounded-md text-xs font-semibold transition-all">
                            Tomorrow
                        </button>
                    </div>
                </div>
                <div class="text-[12px] text-slate-500 text-right uppercase tracking-widest">
                    Last Updated: <span class="text-slate-400" x-text="formatDate(data?.last_updated) || 'Loading...'"></span>
                </div>
            </div>

        </header>

        <div x-show="loading" class="flex justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
        </div>

        <div x-show="!loading" x-cloak class="space-y-8">
            
            <!-- AI Narrative -->
            <section class="bg-slate-800/50 rounded-xl p-6 border border-slate-700 shadow-xl">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4 flex items-center">
                    <svg class="w-4 h-4 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Daily Narrative
                </h2>
                <div class="text-lg leading-relaxed text-slate-200 whitespace-pre-wrap italic" x-text="data?.narrative"></div>
            </section>

            <!-- Main Lineup Table -->
            <section>
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-bold text-white flex items-center">
                        Recommended Daily Lineup
                        <span class="ml-3 text-2xl text-green-400" x-text="data?.total_efficiency_score"></span>
                    </h2>
                    <span class="text-sm text-slate-500" x-text="data?.target_date"></span>
                </div>
                <div class="overflow-x-auto rounded-xl border border-slate-700 bg-slate-900 shadow-2xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800/80 text-slate-400 text-xs uppercase tracking-widest border-b border-slate-700">
                                <th class="px-6 py-4 font-semibold">Slot</th>
                                <th class="px-6 py-4 font-semibold">Player</th>
                                <th class="px-6 py-4 font-semibold text-center">Order</th>
                                <th class="px-6 py-4 font-semibold text-center">Start</th>
                                <th class="px-6 py-4 font-semibold">Matchup</th>
                                <th class="px-6 py-4 font-semibold text-right">Score</th>
                                <th class="px-6 py-4 font-semibold">Breakdown</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800">
                            <template x-for="p in data?.recommended_lineup" :key="p.Player">
                                <tr class="hover:bg-slate-800/40 transition-colors">
                                    <td class="px-6 py-4 text-indigo-400 font-bold" x-text="p.Slot"></td>
                                    <td class="px-6 py-4">
                                        <div class="font-bold text-white" x-text="p.Player"></div>
                                        <div class="text-xs text-slate-500" x-text="p.POS"></div>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <span :class="p.Order.includes('*') ? 'text-amber-400 italic' : 'text-slate-300'" x-text="p.Order"></span>
                                    </td>
                                    <td class="px-6 py-4 text-center text-xs text-slate-400" x-text="formatTime(p.GameTime)"></td>
                                    <td class="px-6 py-4">
                                        <div class="text-sm" x-text="p.Opponent"></div>
                                        <div class="text-xs text-slate-500">SP xERA: <span x-text="p.SP_xERA"></span></div>
                                    </td>
                                    <td class="px-6 py-4 text-right font-mono font-bold text-green-400" x-text="p.Score.toFixed(1)"></td>
                                    <td class="px-6 py-4">
                                        <div class="text-[12px] text-slate-500 max-w-xs leading-tight" x-text="p.Breakdown"></div>
                                        <template x-if="p.Warning">
                                            <div class="mt-1 text-[12px] text-red-400 font-bold" x-text="p.Warning"></div>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Benched Table -->
            <section>
                <h2 class="text-lg font-bold text-white mb-4 flex items-center opacity-60 uppercase tracking-widest">
                    Players Sat
                </h2>
                <div class="overflow-x-auto rounded-xl border border-slate-700 bg-slate-900/40">
                    <table class="w-full text-left border-collapse opacity-80">
                        <thead>
                            <tr class="bg-slate-800/40 text-slate-500 text-xs uppercase tracking-widest border-b border-slate-700">
                                <th class="px-6 py-4 font-semibold">Slot</th>
                                <th class="px-6 py-4 font-semibold">Player</th>
                                <th class="px-6 py-4 font-semibold text-center">Order</th>
                                <th class="px-6 py-4 font-semibold text-center">Start</th>
                                <th class="px-6 py-4 font-semibold">Matchup</th>
                                <th class="px-6 py-4 font-semibold text-right">Score</th>
                                <th class="px-6 py-4 font-semibold">Breakdown</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800">
                            <template x-for="p in data?.players_sat" :key="p.Player">
                                <tr class="hover:bg-slate-800/20 transition-colors">
                                    <td class="px-6 py-4 text-slate-500 font-bold" x-text="p.Slot"></td>
                                    <td class="px-6 py-4">
                                        <div class="font-bold text-slate-300" x-text="p.Player"></div>
                                        <div class="text-[12px] text-slate-600" x-text="p.POS"></div>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <span :class="p.Order.includes('*') ? 'text-amber-600/60 italic' : 'text-slate-500'" x-text="p.Order"></span>
                                    </td>
                                    <td class="px-6 py-4 text-center text-[10px] text-slate-600" x-text="formatTime(p.GameTime)"></td>
                                    <td class="px-6 py-4">
                                        <div class="text-xs text-slate-500" x-text="p.Opponent"></div>
                                        <div class="text-[12px] text-slate-600">SP xERA: <span x-text="p.SP_xERA"></span></div>
                                    </td>
                                    <td class="px-6 py-4 text-right font-mono text-slate-500" x-text="p.Score.toFixed(1)"></td>
                                    <td class="px-6 py-4">
                                        <div class="text-[12px] text-slate-600 max-w-xs leading-tight" x-text="p.Breakdown"></div>
                                        <template x-if="p.Warning">
                                            <div class="mt-1 text-[12px] text-red-400/50 font-bold" x-text="p.Warning"></div>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </div>

    <script>
        function dashboard() {
            return {
                data: null,
                loading: true,
                activeDate: 'today',
                activeProj: 'atc',
                async init() {
                    await this.fetchData();
                },
                async switchDate(date) {
                    if (this.activeDate === date) return;
                    this.activeDate = date;
                    this.loading = true;
                    await this.fetchData();
                },
                async switchProj(proj) {
                    if (this.activeProj === proj) return;
                    this.activeProj = proj;
                    this.loading = true;
                    await this.fetchData();
                },
                async fetchData() {
                    try {
                        const filename = `lineup_${this.activeProj}_${this.activeDate}.json`;
                        console.log("Fetching:", filename);
                        // Add cache-buster to ensure we get fresh data
                        const response = await fetch(`${filename}?t=${new Date().getTime()}`);
                        console.log("Response status:", response.status);
                        if (!response.ok) throw new Error(`File not found: ${filename}`);
                        this.data = await response.json();
                        console.log("Data loaded:", this.data);
                        this.loading = false;
                    } catch (e) {
                        console.error("Failed to load lineup data", e);
                        this.data = { narrative: `⚠️ ${e.message}. Run the optimizer to generate it.`, recommended_lineup: [], players_sat: [] };
                        this.loading = false;
                    }
                },
                formatDate(isoString) {
                    if (!isoString) return '';
                    const date = new Date(isoString);
                    return date.toLocaleString(undefined, {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                },
                formatTime(isoString) {
                    if (!isoString) return '-';
                    const date = new Date(isoString);
                    return date.toLocaleTimeString(undefined, {
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            }
        }
    </script>
</body>
</html>
