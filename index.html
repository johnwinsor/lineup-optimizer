<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zurich Zebras Optimizer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #0f172a; color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans" x-data="dashboard()">
    <div class="max-w-6xl mx-auto">
        
        <!-- Header -->
        <header class="mb-8 border-b border-slate-700 pb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Zurich Zebras Optimizer</h1>
                <p class="text-slate-400 mt-1">Ottoneu Team 7582 • Daily 5x5 Roto Efficiency</p>
            </div>
            <div class="text-left md:text-right">
                <div class="text-sm text-slate-500">Last Updated: <span x-text="data?.last_updated || 'Loading...'"></span></div>
                <div class="mt-2 inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">
                    Projection: <span class="ml-1 font-bold" x-text="data?.projection_system || '-'"></span>
                </div>
            </div>
        </header>

        <div x-show="loading" class="flex justify-center py-20">
            <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500"></div>
        </div>

        <div x-show="!loading" x-cloak class="space-y-8">
            
            <!-- AI Narrative -->
            <section class="bg-slate-800/50 rounded-xl p-6 border border-slate-700 shadow-xl">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4 flex items-center">
                    <svg class="w-4 h-4 mr-2 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    Daily Narrative
                </h2>
                <div class="text-lg leading-relaxed text-slate-200 whitespace-pre-wrap italic" x-text="data?.narrative"></div>
            </section>

            <!-- Main Lineup Table -->
            <section>
                <div class="flex justify-between items-end mb-4">
                    <h2 class="text-xl font-bold text-white flex items-center">
                        Recommended Daily Lineup
                        <span class="ml-3 text-2xl text-green-400" x-text="data?.total_efficiency_score"></span>
                    </h2>
                    <span class="text-sm text-slate-500" x-text="data?.target_date"></span>
                </div>
                <div class="overflow-x-auto rounded-xl border border-slate-700 bg-slate-900 shadow-2xl">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-800/80 text-slate-400 text-xs uppercase tracking-widest border-b border-slate-700">
                                <th class="px-6 py-4 font-semibold">Slot</th>
                                <th class="px-6 py-4 font-semibold">Player</th>
                                <th class="px-6 py-4 font-semibold text-center">Order</th>
                                <th class="px-6 py-4 font-semibold">Matchup</th>
                                <th class="px-6 py-4 font-semibold text-right">Score</th>
                                <th class="px-6 py-4 font-semibold">Breakdown</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800">
                            <template x-for="p in data?.recommended_lineup" :key="p.Player">
                                <tr class="hover:bg-slate-800/40 transition-colors">
                                    <td class="px-6 py-4 text-indigo-400 font-bold" x-text="p.Slot"></td>
                                    <td class="px-6 py-4">
                                        <div class="font-bold text-white" x-text="p.Player"></div>
                                        <div class="text-xs text-slate-500" x-text="p.POS"></div>
                                    </td>
                                    <td class="px-6 py-4 text-center">
                                        <span :class="p.Order.includes('*') ? 'text-amber-400 italic' : 'text-slate-300'" x-text="p.Order"></span>
                                    </td>
                                    <td class="px-6 py-4">
                                        <div class="text-sm" x-text="p.Opponent"></div>
                                        <div class="text-xs text-slate-500">SP xERA: <span x-text="p.SP_xERA"></span></div>
                                    </td>
                                    <td class="px-6 py-4 text-right font-mono font-bold text-green-400" x-text="p.Score.toFixed(1)"></td>
                                    <td class="px-6 py-4">
                                        <div class="text-[10px] text-slate-500 max-w-xs leading-tight" x-text="p.Breakdown"></div>
                                        <template x-if="p.Warning">
                                            <div class="mt-1 text-[10px] text-red-400 font-bold" x-text="p.Warning"></div>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Benched Table -->
            <section>
                <h2 class="text-lg font-bold text-white mb-4 flex items-center opacity-60">
                    Players Sat
                </h2>
                <div class="overflow-x-auto rounded-xl border border-slate-700 bg-slate-900/40">
                    <table class="w-full text-left border-collapse opacity-70">
                        <thead>
                            <tr class="bg-slate-800/40 text-slate-500 text-[10px] uppercase tracking-widest border-b border-slate-700">
                                <th class="px-6 py-3">Player</th>
                                <th class="px-6 py-3 text-center">Order</th>
                                <th class="px-6 py-3 text-right">Proj</th>
                                <th class="px-6 py-3">Note</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800">
                            <template x-for="p in data?.players_sat" :key="p.Player">
                                <tr class="text-sm">
                                    <td class="px-6 py-3">
                                        <span class="font-medium text-slate-300" x-text="p.Player"></span>
                                        <span class="text-[10px] text-slate-600 ml-1" x-text="p.POS"></span>
                                    </td>
                                    <td class="px-6 py-3 text-center text-slate-500" x-text="p.Order"></td>
                                    <td class="px-6 py-3 text-right font-mono text-slate-500" x-text="p.Proj.toFixed(1)"></td>
                                    <td class="px-6 py-3 text-xs text-slate-600 italic" x-text="p.Note"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </section>

        </div>
    </div>

    <script>
        function dashboard() {
            return {
                data: null,
                loading: true,
                async init() {
                    try {
                        const response = await fetch('web_lineup.json');
                        this.data = await response.json();
                        this.loading = false;
                    } catch (e) {
                        console.error("Failed to load lineup data", e);
                    }
                }
            }
        }
    </script>
</body>
</html>
